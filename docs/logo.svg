<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Aesthetics: Purple to Pink to Orange) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2387" />
      <stop offset="50%" stop-color="#E94057" />
      <stop offset="100%" stop-color="#F27121" />
    </linearGradient>
    
    <!-- Music Note Inner Gradient -->
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFE5EC" />
    </linearGradient>

    <!-- Glassmorphic Stroke Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05" />
    </linearGradient>
    
    <!-- Glow Effect for Background -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#E94057" flood-opacity="0.5"/>
    </filter>
    
    <!-- Shadow Effect for Central Icon -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Squircle Background with Gradient & Glow -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" filter="url(#glow)" />
  
  <!-- Outer border highlight (Glassmorphic look) -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="none" stroke="url(#glassGrad)" stroke-width="6" />

  <!-- Decorative sound rings / concentric circles -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="12" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="6" />

  <!-- Music Note & Download Arrow Composite Icon -->
  <g filter="url(#shadow)">
    <!-- Music Note stems & head -->
    <!-- First note head (bottom left) -->
    <ellipse cx="200" cy="290" rx="34" ry="24" transform="rotate(-15, 200, 290)" fill="url(#noteGrad)" />
    <!-- Second note head (bottom right, slightly higher) -->
    <ellipse cx="320" cy="250" rx="34" ry="24" transform="rotate(-15, 320, 250)" fill="url(#noteGrad)" />
    
    <!-- Note stems -->
    <path d="M 230 286 L 230 140 L 350 110 L 350 246" fill="none" stroke="url(#noteGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Note Flag/Beam -->
    <path d="M 230 140 L 350 110 L 350 150 L 230 180 Z" fill="url(#noteGrad)" />

    <!-- Download Arrow symbol overlaid in the center -->
    <!-- White Circle background for arrow to stand out -->
    <circle cx="290" cy="350" r="48" fill="#FFFFFF" />
    <!-- Download Arrow shape (gradient color matching background) -->
    <path d="M 290 326 L 290 366 M 274 350 L 290 366 L 306 350" fill="none" stroke="url(#bgGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 268 376 C 274 380, 306 380, 312 376" fill="none" stroke="url(#bgGrad)" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
